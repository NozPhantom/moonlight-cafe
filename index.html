<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLC POS - Moonlight Galaxy Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-space: #020205;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: linear-gradient(135deg, #a0c4ff 0%, #c49fff 100%);
            --danger: linear-gradient(135deg, #ff6b6b 0%, #ee5253 100%);
            --success: #42e695;
            --warning: #ffbe0b;
            --font-fancy: 'Dancing Script', cursive;
            --font-main: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        body { font-family: var(--font-main); background: var(--bg-space); color: #f0f0f8; min-height: 100vh; overflow-x: hidden; overflow-y: auto; }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); }
        .glass { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid var(--glass-border); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        
        input, select { background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 10px; outline: none; width: 100%; font-family: inherit; font-size: 14px; margin-bottom: 10px; }
        option { background: #0a0a1a; color: white; }
        
        button { cursor: pointer; border: none; border-radius: 12px; font-weight: 600; transition: 0.3s; text-transform: uppercase; font-size: 11px; padding: 12px 20px; }
        .btn-primary { background: var(--accent); color: #050510; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); }
        .btn-danger { background: var(--danger); color: white; }
        
        .discount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-discount { background: rgba(160, 196, 255, 0.1); color: #a0c4ff; padding: 8px; border: 1px solid rgba(160, 196, 255, 0.2); font-size: 10px; }

        .screen { display: none; width: 100%; flex-direction: column; z-index: 10; animation: fadeIn 0.5s ease; padding-bottom: 50px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; height: 80px; position: sticky; top: 0; z-index: 100; margin: 15px 30px; }
        .fancy-title { font-family: var(--font-fancy); font-size: 35px; background: var(--accent); -webkit-background-clip: text; color: transparent; }
        
        .container { display: grid; grid-template-columns: 1fr 380px; gap: 20px; padding: 0 30px 30px; }
        .category-title { font-family: var(--font-fancy); font-size: 35px; color: #a0c4ff; margin: 40px 0 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        
        .mgmt-content { padding: 30px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .mgmt-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-box { padding: 25px; text-align: center; }
        .stat-val { font-size: 28px; font-weight: bold; color: var(--success); margin-top: 10px; }
        .stat-label-net { color: #a0c4ff; font-weight: bold; margin-bottom: 15px; display: block; text-transform: uppercase; letter-spacing: 2px; margin-top: 30px; }

        .stock-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .stock-table td { padding: 15px; background: rgba(255,255,255,0.03); border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border); }

        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
        .dot-green { background-color: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot-red { background-color: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .dot-yellow { background-color: var(--warning); box-shadow: 0 0 10px var(--warning); }

        .mgmt-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .emp-card { padding: 25px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.2s; border: 1px solid var(--glass-border); position: relative; }
        .status-indicator { position: absolute; top: 15px; left: 15px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-content { width: 500px; padding: 40px; max-height: 90vh; overflow-y: auto; }

        #notify-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .notify { padding: 15px 25px; border-radius: 12px; background: #0a0a1a; border: 1px solid var(--success); color: white; margin-bottom: 10px; }
        
        .rank-item { display: flex; align-items: center; gap: 15px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 5px; }

        .shift-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .shift-table th { text-align: left; font-size: 12px; opacity: 0.7; padding-bottom: 8px; }
        .shift-table td { padding: 5px 0; }
        .shift-box { background: #f0f0f8; color: #333; padding: 8px; border-radius: 5px; font-weight: 600; text-align: center; width: 80px; display: inline-block; }
    </style>
</head>
<body>

<div id="canvas-container"><canvas id="bg-canvas"></canvas></div>
<div id="notify-container"></div>

<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content glass" id="modal-body" onclick="event.stopPropagation()"></div>
</div>

<div id="login-screen" class="screen" style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <div class="login-box glass" style="padding:50px; width:400px; text-align:center;">
        <div class="fancy-title">Moonlight Café</div>
        <input type="text" id="username" placeholder="Benutzername" style="margin-top:20px;">
        <input type="password" id="password" placeholder="Passwort">
        <button class="btn-primary" onclick="handleLogin()" style="width:100%; margin-top:20px; height:50px;">Login</button>
    </div>
</div>

<div id="main-system" class="screen">
    <header class="glass">
        <div id="clock">00:00:00</div>
        <div class="fancy-title" style="font-size:24px;">Moonlight Shop</div>
        <div style="display:flex; gap:15px;">
            <button id="mgmt-btn" class="btn-secondary" style="display:none;" onclick="showScreen('mgmt-system')">Management</button>
            <button id="duty-btn" class="btn-primary" onclick="toggleDuty()">Einstempeln</button>
            <button class="btn-danger" onclick="logoutAndClear()">Logout</button>
        </div>
    </header>
    <div class="container">
        <div id="product-list-container"></div>
        <div class="cart-area glass" style="padding:25px; position: sticky; top: 110px; height: calc(100vh - 140px); display:flex; flex-direction:column;">
            <h3 style="font-family:var(--font-fancy); font-size:28px; margin-bottom:20px;">Bestellung</h3>
            <div id="cart-list" style="flex:1; overflow-y:auto; margin-bottom:20px;"></div>
            
            <div style="border-top:1px solid var(--glass-border); padding-top:10px;">
                <div class="discount-grid">
                    <button class="btn-discount" onclick="applyDiscount(0)">0%</button>
                    <button class="btn-discount" onclick="applyDiscount(20)">20%</button>
                    <button class="btn-discount" onclick="applyDiscount(25)">25%</button>
                    <button class="btn-discount" onclick="applyDiscount(50)">50%</button>
                    <button class="btn-discount" onclick="applyDiscount(80)">80%</button>
                    <button class="btn-discount" onclick="applyDiscount(100)">100%</button>
                </div>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="number" id="tip-input" placeholder="Trinkgeld €" style="margin-bottom:0;">
                    <button class="btn-secondary" onclick="addTip()">+</button>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:28px; color:var(--success); margin-bottom:15px;">
                    <span>Gesamt:</span><span><span id="total-price">0.00</span>€</span>
                </div>
                <button class="btn-primary" onclick="submitReceipt()" style="width:100%; height:60px; font-size:16px;">Kauf abschließen</button>
            </div>
        </div>
    </div>
</div>

<div id="mgmt-system" class="screen">
    <header class="glass">
        <div class="fancy-title" style="font-size:24px;">Management</div>
        <button class="btn-secondary" onclick="showScreen('main-system')">Schließen</button>
    </header>
    <div class="mgmt-content">
        <span class="stat-label-net">Umsatz (Brutto)</span>
        <div class="mgmt-stats-grid">
            <div class="stat-box glass"><small>HEUTE</small><div class="stat-val" id="stat-day">0.00 €</div></div>
            <div class="stat-box glass"><small>WOCHE</small><div class="stat-val" id="stat-week">0.00 €</div></div>
            <div class="stat-box glass"><small>MONAT</small><div class="stat-val" id="stat-month">0.00 €</div></div>
        </div>

        <span class="stat-label-net" style="color: var(--success);">Netto-Gewinn</span>
        <div class="mgmt-stats-grid">
            <div class="stat-box glass"><small>HEUTE NETTO</small><div class="stat-val" id="stat-day-net">0.00 €</div></div>
            <div class="stat-box glass"><small>WOCHE NETTO</small><div class="stat-val" id="stat-week-net">0.00 €</div></div>
            <div class="stat-box glass"><small>MONAT NETTO</small><div class="stat-val" id="stat-month-net">0.00 €</div></div>
        </div>

        <h3 class="category-title">Lagerbestand</h3>
        <table class="stock-table" style="width:100%">
            <tbody id="stock-tbody"></tbody>
        </table>

        <h3 class="category-title">Mitarbeiter & Status</h3>
        <div id="emp-grid" class="mgmt-card-grid"></div>

        <h3 class="category-title">Ränge verwalten</h3>
        <div class="glass" style="padding:20px; margin-bottom:30px;">
            <div style="display:grid; grid-template-columns: 2fr 1.5fr auto; gap:10px; margin-bottom:20px;">
                <input type="text" id="new-rank-name" placeholder="Name des Ranges">
                <label style="display:flex; align-items:center; gap:5px; font-size:12px;"><input type="checkbox" id="new-rank-mgmt"> Management Zugriff</label>
                <button class="btn-primary" onclick="addRank()">Hinzufügen</button>
            </div>
            <div id="ranks-list-container"></div>
            <button class="btn-primary" style="width:100%; margin-top:20px; height:50px;" onclick="saveAllRanks()">Ränge Speichern</button>
        </div>
        
        <div class="glass" style="padding:20px;">
            <h4 style="margin-bottom:15px;">Neuen Personal-Login erstellen</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr auto; gap:10px;">
                <input type="text" id="new-u" placeholder="Login Name">
                <input type="password" id="new-p" placeholder="Passwort">
                <select id="new-r"></select>
                <button class="btn-primary" onclick="createEmployee()">Hinzufügen</button>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "1:25359833042:web:349a45f94b9439f61e9a0b",
        authDomain: "moonlight-cafe-html.firebaseapp.com",
        databaseURL: "https://moonlight-cafe-html-default-rtdb.firebaseio.com/",
        projectId: "moonlight-cafe-html",
        storageBucket: "moonlight-cafe-html.appspot.com",
        messagingSenderId: "25359833042",
        appId: "1:25359833042:web:349a45f94b9439f61e9a0b"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();
    
    let products = [], employees = [], ranks = [], currentUser = null, cart = {}, onDuty = false, currentShiftKey = null;
    let currentDiscount = 0, currentTip = 0;

    function loadData() {
        rtdb.ref('ranks').on('value', s => {
            const d = s.val();
            ranks = d ? Object.keys(d).map(k => ({ id: k, ...d[k] })) : [];
            refreshRankDisplays();
        });
        rtdb.ref('employees').on('value', s => {
            const d = s.val(); 
            employees = d ? Object.keys(d).map(k => ({ id: k, ...d[k] })) : [];
            refreshMgmt();
        });
        rtdb.ref('products').on('value', s => {
            const d = s.val(); 
            products = d ? Object.keys(d).map(k => ({ id: k, ...d[k] })) : [];
            renderProducts(); 
            refreshMgmt();
        });
        rtdb.ref('totals').on('value', s => {
            const t = s.val() || { day: 0, week: 0, month: 0, dayNet: 0, weekNet: 0, monthNet: 0 };
            document.getElementById('stat-day').innerText = (t.day || 0).toFixed(2) + " €";
            document.getElementById('stat-week').innerText = (t.week || 0).toFixed(2) + " €";
            document.getElementById('stat-month').innerText = (t.month || 0).toFixed(2) + " €";
            document.getElementById('stat-day-net').innerText = (t.dayNet || 0).toFixed(2) + " €";
            document.getElementById('stat-week-net').innerText = (t.weekNet || 0).toFixed(2) + " €";
            document.getElementById('stat-month-net').innerText = (t.monthNet || 0).toFixed(2) + " €";
        });
    }

    function refreshMgmt() {
        const grid = document.getElementById('emp-grid');
        if(grid) {
            grid.innerHTML = "";
            employees.forEach(e => {
                const r = ranks.find(x => x.id === e.role);
                let isOnline = false;
                if(e.shifts) {
                    const lastShift = Object.values(e.shifts).pop();
                    if(lastShift && !lastShift.end) isOnline = true;
                }
                grid.innerHTML += `<div class="emp-card glass" onclick="openEmpModal('${e.id}')">
                    <div class="status-indicator"><span class="dot ${isOnline ? 'dot-green' : 'dot-red'}"></span></div>
                    <strong>${e.u}</strong><br><small>${r ? r.name : 'Kein Rang'}</small><br>
                    <span style="color:var(--success); font-size:11px;">Woche: ${(e.weeklySales || 0).toFixed(2)}€</span>
                </div>`;
            });
        }
        const tbody = document.getElementById('stock-tbody'); 
        if(tbody) {
            tbody.innerHTML = "";
            products.forEach(p => {
                let s = p.stock || 0;
                let dot = s < 20 ? 'dot-red' : (s < 150 ? 'dot-yellow' : 'dot-green');
                tbody.innerHTML += `<tr><td style="width:40px"><span class="dot ${dot}"></span></td><td><input type="text" value="${p.name}" class="glass" style="margin:0" onchange="updateP('${p.id}','name',this.value)"></td><td style="width:100px"><input type="number" value="${p.stock||0}" class="glass" style="margin:0" onchange="updateP('${p.id}','stock',parseInt(this.value))"></td><td style="width:50px"><button class="btn-danger" onclick="deleteP('${p.id}')">X</button></td></tr>`;
            });
        }
    }

    function fmtTime(ts) {
        if(!ts) return "hh:mm";
        const d = new Date(ts);
        return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }

    // MODAL FUNKTION MIT RANG-AUSWAHL
    function openEmpModal(id) {
        const e = employees.find(x => x.id === id);
        let shiftsHtml = "";
        let totalHrs = 0;

        // Ränge für das Dropdown vorbereiten
        let rankOptions = ranks.map(r => `<option value="${r.id}" ${e.role === r.id ? 'selected' : ''}>${r.name}</option>`).join('');

        if(e.shifts) {
            Object.values(e.shifts).reverse().slice(0,10).forEach(s => {
                let saldo = 0;
                if(s.end) {
                    saldo = (s.end - s.start) / 1000 / 60 / 60;
                    totalHrs += saldo;
                }
                shiftsHtml += `<tr><td><div class="shift-box">${fmtTime(s.start)}</div></td><td><div class="shift-box">${s.end ? fmtTime(s.end) : '--:--'}</div></td><td style="text-align:right; font-weight:bold;">${saldo > 0 ? saldo.toFixed(2) : '0.00'}</td></tr>`;
            });
        }

        document.getElementById('modal-body').innerHTML = `
            <h2 style="margin-bottom:20px; font-family:var(--font-fancy); color:#a0c4ff;">Profil: ${e.u}</h2>
            <label>Name</label><input type="text" id="edit-u" value="${e.u}">
            <label>Passwort</label><input type="text" id="edit-p" value="${e.p}">
            <label>Rang</label>
            <select id="edit-r">${rankOptions}</select>
            <button class="btn-primary" style="width:100%" onclick="saveEmp('${id}')">Daten Speichern</button>
            
            <div style="margin-top:30px;">
                <table class="shift-table">
                    <thead><tr><th>Kommen</th><th>Gehen</th><th style="text-align:right">Saldo</th></tr></thead>
                    <tbody>${shiftsHtml || '<tr><td colspan="3" style="opacity:0.5; padding:20px; text-align:center;">Keine Schichten</td></tr>'}</tbody>
                </table>
                <div style="display:flex; justify-content:space-between; margin-top:20px; border-top:1px solid #fff; padding-top:10px; font-weight:bold;">
                    <span>Total Stunden</span><span>${totalHrs.toFixed(2)}</span>
                </div>
            </div>

            <button class="btn-danger" style="width:100%; margin-top:30px;" onclick="deleteEmp('${id}')">Mitarbeiter Löschen</button>
            <button class="btn-secondary" style="width:100%; margin-top:10px;" onclick="closeModal()">Schließen</button>
        `;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function saveEmp(id) { 
        rtdb.ref(`employees/${id}`).update({ 
            u: document.getElementById('edit-u').value, 
            p: document.getElementById('edit-p').value,
            role: document.getElementById('edit-r').value
        }); 
        closeModal(); 
    }

    function deleteEmp(id) { if(confirm("Löschen?")) { rtdb.ref(`employees/${id}`).remove(); closeModal(); } }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function refreshRankDisplays() {
        const sel = document.getElementById('new-r');
        const cont = document.getElementById('ranks-list-container');
        if(sel) sel.innerHTML = ranks.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        if(cont) { cont.innerHTML = ranks.map(r => `
            <div class="rank-item">
                <input type="text" value="${r.name}" class="glass" id="edit-rank-name-${r.id}" style="flex:2">
                <label style="display:flex; align-items:center; gap:5px; font-size:12px;"><input type="checkbox" id="edit-rank-mgmt-${r.id}" ${r.mgmt ? 'checked' : ''}> Mgmt.</label>
                <button class="btn-danger" style="padding:5px 10px" onclick="deleteRank('${r.id}')">X</button>
            </div>`).join(''); }
    }

    function saveAllRanks() {
        ranks.forEach(r => {
            const nameValue = document.getElementById(`edit-rank-name-${r.id}`).value;
            const mgmtValue = document.getElementById(`edit-rank-mgmt-${r.id}`).checked;
            rtdb.ref('ranks/'+r.id).update({ name: nameValue, mgmt: mgmtValue });
        });
        customNotify("Alle Ränge gespeichert");
    }

    function addRank() { rtdb.ref('ranks').push({ name: document.getElementById('new-rank-name').value, mgmt: document.getElementById('new-rank-mgmt').checked }); }
    function deleteRank(id) { rtdb.ref('ranks/'+id).remove(); }
    function deleteP(id) { if(confirm("Löschen?")) rtdb.ref('products/'+id).remove(); }
    function updateP(id, f, v) { rtdb.ref(`products/${id}`).update({ [f]: v }); }
    function createEmployee() { rtdb.ref('employees').push({ u: document.getElementById('new-u').value, p: document.getElementById('new-p').value, role: document.getElementById('new-r').value, weeklySales: 0 }); }

    function handleLogin() {
        const u = document.getElementById('username').value, p = document.getElementById('password').value;
        if(u === "OM_MA") { currentUser = {id:"admin", u:"Admin"}; document.getElementById('mgmt-btn').style.display="block"; showScreen('main-system'); return; }
        const user = employees.find(x => x.u === u && x.p === p);
        if(user) { currentUser = user; const r = ranks.find(x => x.id === user.role); document.getElementById('mgmt-btn').style.display = (r && r.mgmt) ? "block" : "none"; showScreen('main-system'); }
    }
    function logoutAndClear() {
        if(onDuty && currentUser && currentShiftKey) rtdb.ref(`employees/${currentUser.id}/shifts/${currentShiftKey}`).update({ end: Date.now() });
        location.reload();
    }
    function toggleDuty() {
        onDuty = !onDuty; const b = document.getElementById('duty-btn');
        if(onDuty) { currentShiftKey = rtdb.ref(`employees/${currentUser.id}/shifts`).push({ start: Date.now() }).key; b.innerText = "Ausstempeln"; b.className = "btn-danger"; customNotify("Eingestempelt!"); } 
        else { rtdb.ref(`employees/${currentUser.id}/shifts/${currentShiftKey}`).update({ end: Date.now() }); b.innerText = "Einstempeln"; b.className = "btn-primary"; customNotify("Ausgestempelt!"); currentShiftKey = null; }
    }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.style.display='none'); document.getElementById(id).style.display='flex'; }
    function customNotify(m) { const n = document.createElement('div'); n.className="notify"; n.innerText=m; document.getElementById('notify-container').appendChild(n); setTimeout(()=>n.remove(), 3000); }

    function renderProducts() {
        const c = document.getElementById('product-list-container'); c.innerHTML = "";
        ["Kleine Snacks", "Kuchen & Süsses", "Getränke"].forEach(cat => {
            const ps = products.filter(p => p.category === cat);
            if(ps.length) {
                c.innerHTML += `<div class="category-title">${cat}</div>`;
                let g = `<div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:20px;">`;
                ps.forEach(p => { g += `<div class="glass" style="padding:20px; text-align:center;"><strong>${p.name}</strong><br>${p.price.toFixed(2)}€<div style="display:flex; justify-content:center; gap:10px; margin-top:10px;"><button class="btn-secondary" onclick="updateQty('${p.id}',-1)">-</button><span>${cart[p.id]?.qty || 0}</span><button class="btn-secondary" onclick="updateQty('${p.id}',1)">+</button></div></div>`; });
                c.innerHTML += g + `</div>`;
            }
        });
    }
    function updateQty(id, d) { let n = (cart[id]?.qty || 0) + d; if(n > 0) cart[id] = { name: products.find(x => x.id === id).name, qty: n, price: products.find(x => x.id === id).price }; else delete cart[id]; renderCart(); renderProducts(); }
    function addTip() { const val = parseFloat(document.getElementById('tip-input').value); if(!isNaN(val) && val >= 0) { currentTip = val; document.getElementById('tip-input').value = ""; renderCart(); } }
    function applyDiscount(p) { currentDiscount = p; renderCart(); }
    function renderCart() {
        let l = document.getElementById('cart-list'), baseSum = 0; l.innerHTML = "";
        for(let id in cart) { baseSum += cart[id].qty * cart[id].price; l.innerHTML += `<div>${cart[id].qty}x ${cart[id].name}</div>`; }
        if(currentTip > 0) l.innerHTML += `<div style="color:var(--success)">+ Trinkgeld: ${currentTip.toFixed(2)}€</div>`;
        let finalSum = (baseSum * (1 - (currentDiscount / 100))) + currentTip;
        document.getElementById('total-price').innerText = finalSum.toFixed(2);
    }
    async function submitReceipt() {
        if(!onDuty) return customNotify("Nicht eingestempelt!");
        const totalBrutto = parseFloat(document.getElementById('total-price').innerText);
        let totalNetto = currentTip;
        for(let id in cart) {
            let p = products.find(x => x.id === id);
            totalNetto += cart[id].qty * (p.price * (1 - (currentDiscount / 100)) - (p.ek || 0));
            rtdb.ref('products/'+id).update({ stock: (p.stock || 0) - cart[id].qty });
        }
        rtdb.ref('totals').transaction(t => { if(t) { t.day += totalBrutto; t.week += totalBrutto; t.month += totalBrutto; t.dayNet += totalNetto; t.weekNet += totalNetto; t.monthNet += totalNetto; } return t; });
        cart = {}; currentDiscount = 0; currentTip = 0; renderCart(); renderProducts(); customNotify("Erfolg!");
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = loadData;

    const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
    let w, h, pts = []; window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }; window.onresize();
    class Part { constructor() { this.x = Math.random()*w; this.y = Math.random()*h; this.vx = Math.random()*0.4-0.2; this.vy = Math.random()*0.4-0.2; } draw() { this.x += this.vx; this.y += this.vy; ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.arc(this.x,this.y,1,0,Math.PI*2); ctx.fill(); } }
    for(let i=0; i<100; i++) pts.push(new Part()); function anim() { ctx.clearRect(0,0,w,h); pts.forEach(x => x.draw()); requestAnimationFrame(anim); } anim();
</script>
</body>
