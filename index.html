<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLC POS - Moonlight Galaxy Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-space: #020205;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: linear-gradient(135deg, #a0c4ff 0%, #c49fff 100%);
            --danger: linear-gradient(135deg, #ff6b6b 0%, #ee5253 100%);
            --font-fancy: 'Dancing Script', cursive;
            --font-main: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        body { font-family: var(--font-main); background: var(--bg-space); color: #f0f0f8; overflow: hidden; height: 100vh; }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); }
        .glass { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid var(--glass-border); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        
        input, select { background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 12px; outline: none; width: 100%; font-family: inherit; }
        button { cursor: pointer; border: none; border-radius: 12px; font-weight: 600; transition: 0.3s; text-transform: uppercase; font-size: 11px; }
        
        .btn-primary { background: var(--accent); color: #050510; padding: 12px 20px; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); padding: 12px 20px; }
        .btn-danger { background: var(--danger); color: white; padding: 12px 20px; }
        
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; flex-direction: column; z-index: 10; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; height: 80px; }
        .fancy-title { font-family: var(--font-fancy); font-size: 35px; background: var(--accent); -webkit-background-clip: text; color: transparent; }
        
        .container { display: grid; grid-template-columns: 1fr 380px; gap: 20px; padding: 0 30px 30px; height: calc(100vh - 80px); }
        #product-list-container { overflow-y: auto; scrollbar-width: none; }
        .category-title { font-family: var(--font-fancy); font-size: 30px; color: #a0c4ff; margin: 25px 0 15px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        .qty-controls { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .qty-btn { width: 30px; height: 30px; background: rgba(255,255,255,0.1); border-radius: 5px; color: white; font-size: 18px; line-height: 1; }
        .qty-input { width: 50px !important; text-align: center; padding: 5px !important; }

        .mgmt-content { padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; }
        .mgmt-stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 10px; }
        .stat-box { padding: 20px; text-align: center; }
        .stat-val { font-size: 24px; font-weight: bold; color: #42e695; margin-top: 5px; }

        .mgmt-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .emp-card { padding: 25px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .emp-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-3px); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-content { width: 450px; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto; }
        
        .time-table { width: 100%; border-collapse: separate; border-spacing: 5px; margin-top: 15px; }
        .time-table th { text-align: left; font-size: 12px; color: #a0c4ff; }
        .time-table input { padding: 8px; text-align: center; background: white; color: #333; border: 1px solid #ccc; border-radius: 5px; width: 100%; }
        .total-row { display: flex; justify-content: space-between; margin-top: 25px; font-weight: bold; border-top: 1px solid var(--glass-border); padding-top: 15px; }

        #notify-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .notify { padding: 15px 25px; border-radius: 12px; background: rgba(10, 10, 25, 0.95); border: 1px solid var(--glass-border); color: white; min-width: 250px; }
    </style>
</head>
<body>

<div id="canvas-container"><canvas id="bg-canvas"></canvas></div>
<div id="notify-container"></div>

<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content glass" id="modal-body" onclick="event.stopPropagation()"></div>
</div>

<div id="login-screen" class="screen" style="display:flex; justify-content:center; align-items:center;">
    <div class="login-box glass" style="padding:50px; width:400px; text-align:center;">
        <div class="fancy-title">Moonlight Café</div>
        <input type="text" id="username" placeholder="Benutzername">
        <input type="password" id="password" placeholder="Passwort" style="margin-top:15px;">
        <button class="btn-primary" onclick="handleLogin()" style="width:100%; margin-top:30px;">Login</button>
    </div>
</div>

<div id="main-system" class="screen">
    <header class="glass" style="margin:15px 30px; border-radius:20px;">
        <div id="clock">00:00:00</div>
        <div class="fancy-title" style="font-size:24px;">Moonlight</div>
        <div style="display:flex; gap:15px;">
            <button id="mgmt-btn" class="btn-secondary" style="display:none;" onclick="showScreen('mgmt-system')">Management</button>
            <button id="duty-btn" class="btn-primary" onclick="toggleDuty()">Einstempeln</button>
            <button class="btn-danger" onclick="location.reload()">Logout</button>
        </div>
    </header>
    <div class="container">
        <div id="product-list-container"></div>
        <div class="cart-area glass" style="padding:25px; display:flex; flex-direction:column;">
            <h3 style="font-family:var(--font-fancy); font-size:24px;">Bestellung</h3>
            <div id="cart-list" style="flex:1; margin:20px 0; overflow-y:auto;"></div>
            <div style="border-top:1px solid var(--glass-border); padding-top:15px;">
                <div style="display:flex; gap:5px; margin-bottom:15px;">
                    <button class="btn-primary" style="flex:1; font-size:10px;" onclick="setDiscount(0, this)">0%</button>
                    <button class="btn-secondary" style="flex:1; font-size:10px;" onclick="setDiscount(20, this)">20%</button>
                    <button class="btn-secondary" style="flex:1; font-size:10px;" onclick="setDiscount(50, this)">50%</button>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:24px; color:#42e695;">
                    <span>Total:</span><span><span id="total-price">0.00</span>€</span>
                </div>
                <button class="btn-primary" onclick="submitReceipt()" style="width:100%; margin-top:20px; height:50px;">Quittung senden</button>
            </div>
        </div>
    </div>
</div>

<div id="mgmt-system" class="screen">
    <header class="glass" style="margin:15px 30px; border-radius:20px;">
        <div class="fancy-title" style="font-size:24px;">Zentrale</div>
        <button class="btn-secondary" onclick="showScreen('main-system')">Schließen</button>
    </header>
    <div class="mgmt-content">
        <div class="mgmt-stats-grid">
            <div class="stat-box glass"><div style="font-size:11px; opacity:0.7;">TAGESEINNAHMEN</div><div class="stat-val" id="stat-day">0.00 €</div></div>
            <div class="stat-box glass"><div style="font-size:11px; opacity:0.7;">WOCHENEINNAHMEN</div><div class="stat-val" id="stat-week">0.00 €</div></div>
            <div class="stat-box glass"><div style="font-size:11px; opacity:0.7;">MONATSEINNAHMEN</div><div class="stat-val" id="stat-month">0.00 €</div></div>
        </div>
        <div class="glass" style="padding:25px;">
            <h4 style="margin-bottom:20px; color:#a0c4ff;">Neuer Mitarbeiter</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr auto; gap:15px;">
                <input type="text" id="new-u" placeholder="Login-Name"><input type="password" id="new-p" placeholder="Passwort">
                <select id="new-r"><option>Techniker</option><option>Geschäftsführung</option><option>Stv. Geschäftsführung</option><option>Management</option><option>Kaffeespezialist</option><option>Barista</option><option>Azubi</option></select>
                <button class="btn-primary" onclick="createEmployee()">Hinzufügen</button>
            </div>
        </div>
        <h3 class="category-title">Mitarbeiter & Logins</h3>
        <div id="emp-grid" class="mgmt-card-grid"></div>
        <h3 class="category-title">Lagerverwaltung</h3>
        <div class="glass" style="padding:20px;">
            <table style="width:100%; text-align:left; border-collapse:collapse;">
                <thead><tr style="color:#a0c4ff;"><th>Produkt</th><th>Bestand</th><th>Neu</th><th>Aktion</th></tr></thead>
                <tbody id="stock-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "1:25359833042:web:349a45f94b9439f61e9a0b",
        authDomain: "moonlight-cafe-html.firebaseapp.com",
        databaseURL: "https://moonlight-cafe-html-default-rtdb.firebaseio.com/",
        projectId: "moonlight-cafe-html",
        storageBucket: "moonlight-cafe-html.appspot.com",
        messagingSenderId: "25359833042",
        appId: "1:25359833042:web:349a45f94b9439f61e9a0b"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();
    let products = [], employees = [], currentUser = null, cart = {}, onDuty = false, currentDiscount = 0, currentShiftKey = null;

    function loadData() {
        rtdb.ref('employees').on('value', s => {
            const d = s.val(); employees = d ? Object.keys(d).map(k => ({ id: k, ...d[k] })) : [];
            if(document.getElementById('mgmt-system').style.display === 'flex') refreshMgmt();
        });
        rtdb.ref('products').on('value', s => {
            const d = s.val(); products = d ? Object.keys(d).map(k => ({ id: k, ...d[k] })) : [];
            renderProducts(); if(document.getElementById('mgmt-system').style.display === 'flex') refreshMgmt();
        });
        rtdb.ref('totals').on('value', s => {
            const t = s.val() || { day: 0, week: 0, month: 0 };
            document.getElementById('stat-day').innerText = (t.day || 0).toFixed(2) + " €";
            document.getElementById('stat-week').innerText = (t.week || 0).toFixed(2) + " €";
            document.getElementById('stat-month').innerText = (t.month || 0).toFixed(2) + " €";
        });
        setInterval(checkResets, 30000);
    }

    function checkResets() {
        const now = new Date();
        const isLastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() === now.getDate();
        if (now.getHours() === 23 && now.getMinutes() === 59) {
            rtdb.ref('lastReset').once('value', s => {
                const todayStr = now.toDateString();
                if (s.val() !== todayStr) {
                    rtdb.ref('totals/day').set(0);
                    if (now.getDay() === 0) { rtdb.ref('totals/week').set(0); employees.forEach(e => { rtdb.ref(`employees/${e.id}/shifts`).remove(); rtdb.ref(`employees/${e.id}`).update({ weeklySales: 0 }); }); }
                    if (isLastDay) rtdb.ref('totals/month').set(0);
                    rtdb.ref('lastReset').set(todayStr);
                }
            });
        }
    }

    function renderProducts() {
        const container = document.getElementById('product-list-container'); container.innerHTML = "";
        const cats = [...new Set(products.map(p => p.category))];
        cats.forEach(cat => {
            container.innerHTML += `<div class="category-title">${cat}</div>`;
            const g = document.createElement('div'); g.className = "products-grid";
            products.filter(p => p.category === cat).forEach(p => {
                g.innerHTML += `<div class="product-card glass" style="padding:20px; text-align:center;">
                    <strong>${p.name}</strong><br><small>${p.price.toFixed(2)}€</small>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty('${p.id}', -1)">-</button>
                        <input type="number" class="qty-input" value="${cart[p.id]?.qty || 0}" readonly>
                        <button class="qty-btn" onclick="updateQty('${p.id}', 1)">+</button>
                    </div></div>`;
            });
            container.appendChild(g);
        });
    }

    function updateQty(id, d) {
        let n = (cart[id]?.qty || 0) + d;
        if(n > 0) cart[id] = { name: products.find(x => x.id === id).name, qty: n, price: products.find(x => x.id === id).price };
        else delete cart[id];
        renderCart(); renderProducts();
    }

    function renderCart() {
        const list = document.getElementById('cart-list'); list.innerHTML = ""; let sub = 0;
        for(let id in cart) { sub += cart[id].qty * cart[id].price; list.innerHTML += `<div style="display:flex; justify-content:space-between;"><span>${cart[id].qty}x ${cart[id].name}</span><span>${(cart[id].qty*cart[id].price).toFixed(2)}€</span></div>`; }
        document.getElementById('total-price').innerText = (sub * (1 - currentDiscount / 100)).toFixed(2);
    }

    async function submitReceipt() {
        if(!Object.keys(cart).length || !onDuty) return customNotify("Nicht eingestempelt!", "error");
        const total = parseFloat(document.getElementById('total-price').innerText);
        rtdb.ref(`employees/${currentUser.id}`).update({ weeklySales: (currentUser.weeklySales || 0) + total });
        rtdb.ref('totals').transaction(t => { if (t) { t.day = (t.day || 0) + total; t.week = (t.week || 0) + total; t.month = (t.month || 0) + total; } return t; });
        for(let id in cart) { let p = products.find(x => x.id === id); rtdb.ref('products/'+id).update({stock: p.stock - cart[id].qty}); }
        cart = {}; renderCart(); renderProducts(); customNotify("Erfolg!");
    }

    function refreshMgmt() {
        const grid = document.getElementById('emp-grid'); grid.innerHTML = "";
        employees.forEach(e => { grid.innerHTML += `<div class="emp-card glass" onclick="openEmpModal('${e.id}')"><strong>${e.u}</strong><br><small>${e.role}</small></div>`; });
        const tbody = document.getElementById('stock-tbody'); tbody.innerHTML = "";
        products.forEach(p => { tbody.innerHTML += `<tr style="border-bottom:1px solid rgba(255,255,255,0.1);"><td style="padding:15px;">${p.name}</td><td style="color:#a0c4ff; font-weight:bold;">${p.stock}</td><td><input type="number" id="stock-input-${p.id}" style="width:80px;"></td><td style="text-align:right;"><button class="btn-primary" onclick="updateStock('${p.id}')">Save</button></td></tr>`; });
    }

    function updateStock(id) { const val = document.getElementById(`stock-input-${id}`).value; if(val) rtdb.ref('products/'+id).update({stock: parseInt(val)}); }

    function openEmpModal(id) {
        const emp = employees.find(e => e.id === id);
        const roles = ["Techniker", "Geschäftsführung", "Stv. Geschäftsführung", "Management", "Kaffeespezialist", "Barista", "Azubi"];
        document.getElementById('modal-body').innerHTML = `
            <div style="background:rgba(66,230,149,0.1); padding:15px; border-radius:12px; text-align:center; margin-bottom:20px;">
                <small>Wocheneinnahmen</small><div style="font-size:24px; color:#42e695; font-weight:bold;">${(emp.weeklySales || 0).toFixed(2)} €</div>
            </div>
            <input type="text" id="edit-u" value="${emp.u}" style="margin-bottom:10px;"><input type="text" id="edit-p" value="${emp.p}" style="margin-bottom:10px;">
            <select id="edit-r" style="margin-bottom:15px;">${roles.map(r => `<option ${emp.role===r?'selected':''}>${r}</option>`).join("")}</select>
            <button class="btn-primary" style="width:100%; margin-bottom:10px;" onclick="saveEmp('${id}')">Speichern</button>
            <button class="btn-secondary" style="width:100%;" onclick="renderModalTimes('${id}')">Zeiten</button>`;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function renderModalTimes(id) {
        const emp = employees.find(e => e.id === id);
        let shiftRows = "", totalMinutes = 0;
        if(emp.shifts) {
            Object.values(emp.shifts).forEach(s => {
                const start = s.start ? new Date(s.start).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "hh:mm";
                const end = s.end ? new Date(s.end).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "hh:mm";
                let saldo = "0.00";
                if(s.start && s.end) { const diff = (s.end - s.start) / 1000 / 60; totalMinutes += diff; saldo = (diff/60).toFixed(2); }
                shiftRows += `<tr><td><input type="text" value="${start}" readonly></td><td><input type="text" value="${end}" readonly></td><td style="text-align:center;">${saldo}</td></tr>`;
            });
        }
        document.getElementById('modal-body').innerHTML = `
            <h2 style="margin-bottom:10px; color:#a0c4ff;">Stempelzeiten</h2>
            <table class="time-table"><thead><tr><th>Kommen</th><th>Gehen</th><th>Saldo</th></tr></thead><tbody>${shiftRows || '<tr><td colspan="3">Keine Daten</td></tr>'}</tbody></table>
            <div class="total-row"><span>Total Stunden</span><span>${(totalMinutes/60).toFixed(2)}</span></div>
            <button class="btn-secondary" style="width:100%; margin-top:25px;" onclick="openEmpModal('${id}')">Zurück</button>`;
    }

    function saveEmp(id) { rtdb.ref(`employees/${id}`).update({ u: document.getElementById('edit-u').value, p: document.getElementById('edit-p').value, role: document.getElementById('edit-r').value }); closeModal(); }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function handleLogin() {
        const user = employees.find(e => e.u === document.getElementById('username').value && e.p === document.getElementById('password').value);
        if(user) { currentUser = user; document.getElementById('mgmt-btn').style.display = ["Techniker", "Geschäftsführung", "Stv. Geschäftsführung", "Management"].includes(user.role) ? "block" : "none"; showScreen('main-system'); }
    }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'flex'; if(id === 'mgmt-system') refreshMgmt(); }
    function createEmployee() { rtdb.ref('employees').push({ u: document.getElementById('new-u').value, p: document.getElementById('new-p').value, role: document.getElementById('new-r').value, weeklySales: 0 }); }
    function toggleDuty() {
        onDuty = !onDuty; const b = document.getElementById('duty-btn');
        if(onDuty) { currentShiftKey = rtdb.ref(`employees/${currentUser.id}/shifts`).push({ start: Date.now() }).key; b.innerText="Ausstempeln"; b.className="btn-danger"; }
        else { rtdb.ref(`employees/${currentUser.id}/shifts/${currentShiftKey}`).update({ end: Date.now() }); b.innerText="Einstempeln"; b.className="btn-primary"; }
    }
    function setDiscount(val, btn) { currentDiscount = val; document.querySelectorAll('.btn-discount').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderCart(); }
    function customNotify(m) { const n = document.createElement('div'); n.className="notify glass"; n.innerText=m; document.getElementById('notify-container').appendChild(n); setTimeout(()=>n.remove(), 3000); }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = loadData;
    const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
    let w, h, pts = [];
    window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }; window.onresize();
    class Part { constructor() { this.x = Math.random()*w; this.y = Math.random()*h; this.vx = Math.random()*0.4-0.2; this.vy = Math.random()*0.4-0.2; } draw() { this.x += this.vx; this.y += this.vy; ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.arc(this.x,this.y,1,0,Math.PI*2); ctx.fill(); } }
    for(let i=0; i<150; i++) pts.push(new Part());
    function anim() { ctx.clearRect(0,0,w,h); pts.forEach(x => x.draw()); requestAnimationFrame(anim); } anim();
</script>
</body>
</html>
